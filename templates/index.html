<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant AI — Nutrient Classifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container animate-in">
        <header class="header">
            <h1>Plant Nutrient Checker</h1>
            <p>Upload a leaf photo to check for healthy or nutrient-deficiency symptoms.</p>
        </header>

        <main class="glass-card">
            <form method="post" enctype="multipart/form-data" id="analysisForm">
                <div class="upload-zone" id="dropZone">
                    <input type="file" name="file" id="fileInput" class="file-input" accept="image/*" required>
                    <span class="upload-icon">⌁</span>
                    <p id="uploadText">Click or drag an image here</p>
                    <div class="preview-box" id="previewBox">
                        <img id="previewImg" class="preview-img" alt="Selected leaf">
                        <p id="fileName" style="font-size: 13px; color: var(--text-dim);"></p>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="analyzeBtn" disabled>
                    Start Analysis
                </button>
            </form>

            {% if error %}
                <p style="color: var(--danger); font-size: 13px; text-align: center; margin-top: 15px;">
                {{ error }}
            </p>
            {% endif %}
        </main>

        <footer style="text-align: center; margin-top: 30px;">
                <a href="/metrics" class="nav-link" style="font-size: 13px;">
                    View model metrics
            </a>
        </footer>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const previewBox = document.getElementById('previewBox');
        const previewImg = document.getElementById('previewImg');
        const uploadText = document.getElementById('uploadText');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const fileNameDisplay = document.getElementById('fileName');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewImg.src = event.target.result;
                    previewBox.classList.add('show');
                    uploadText.style.display = 'none';
                    document.querySelector('.upload-icon').style.display = 'none';
                    analyzeBtn.disabled = false;
                    fileNameDisplay.textContent = file.name;
                };
                reader.readAsDataURL(file);
            }
        });

        // Simple drag feedback
        dropZone.addEventListener('dragover', () => dropZone.classList.add('active'));
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('active'));
        dropZone.addEventListener('drop', () => dropZone.classList.remove('active'));
    </script>
</body>
</html>
